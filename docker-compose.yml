services:
  api:
    build: .
    container_name: support-api

    command: >
      uvicorn app_api:api
      --host 0.0.0.0
      --port 8000

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

  dashboard:
    build: .
    container_name: support-dashboard

    command: >
      streamlit run app_dashboard.py
      --server.port=8501
      --server.address=0.0.0.0

    ports:
      - "8501:8501"

    env_file:
      - .env

    environment:
      API_URL: http://api:8000

    volumes:
      - .:/app

    depends_on:
      - api